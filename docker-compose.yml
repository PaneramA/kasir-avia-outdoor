services:
  postgres:
    image: postgres:16
    container_name: avia-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aviaoutdoor
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - avia_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aviaoutdoor"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  avia_postgres_data:
