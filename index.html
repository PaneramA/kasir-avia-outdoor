<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AviaOutdoor - Rental Management System</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Main CSS -->
    <!-- Core & Layout -->
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <!-- Feature Styles -->
    <link rel="stylesheet" href="css/features/dashboard.css">
    <link rel="stylesheet" href="css/features/inventory.css">
    <link rel="stylesheet" href="css/features/rental.css">
</head>

<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-mountain-sun"></i>
                    <span>AviaOutdoor</span>
                </div>
            </div>

            <nav class="sidebar-nav">
                <ul>
                    <li class="active" data-page="dashboard">
                        <i class="fas fa-th-large"></i>
                        <span>Dashboard</span>
                    </li>
                    <li data-page="rental">
                        <i class="fas fa-handshake"></i>
                        <span>Sewa Barang</span>
                    </li>
                    <li data-page="return">
                        <i class="fas fa-undo"></i>
                        <span>Pengembalian</span>
                    </li>
                    <li data-page="inventory">
                        <i class="fas fa-boxes-stacked"></i>
                        <span>Inventaris</span>
                    </li>
                    <li data-page="history">
                        <i class="fas fa-history"></i>
                        <span>Riwayat</span>
                    </li>
                </ul>
            </nav>

            <div class="sidebar-footer">
                <div class="user-info">
                    <img src="https://ui-avatars.com/api/?name=Admin+Avia&background=E67E22&color=fff" alt="User">
                    <div class="details">
                        <span class="name">Admin Avia</span>
                        <span class="role">Store Manager</span>
                    </div>
                </div>
                <button class="logout-btn">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="content-header">
                <div class="header-title">
                    <h1 id="page-title">Dashboard</h1>
                    <p id="page-subtitle">Selamat datang kembali, Admin.</p>
                </div>
                <div class="header-actions">
                    <div class="search-bar">
                        <i class="fas fa-search"></i>
                        <input type="text" placeholder="Cari transaksi atau barang...">
                    </div>
                    <button class="notification-btn">
                        <i class="fas fa-bell"></i>
                        <span class="badge">3</span>
                    </button>
                </div>
            </header>

            <div id="content-view" class="content-view">
                <!-- Content will be injected here via JS -->
                <div class="dashboard-loading">
                    <div class="spinner"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Main Logic -->
    <!-- Main Logic -->
    <script src="js/app.js"></script>
    <!-- Feature Modules -->
    <script src="js/modules/dashboard.js"></script>
    <script src="js/modules/inventory.js"></script>
    <script src="js/modules/rental.js"></script>
</body>

</html>
