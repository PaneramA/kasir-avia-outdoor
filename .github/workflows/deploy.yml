name: Deploy Production

on:
  workflow_dispatch:
  pull_request:
    types:
      - closed
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: production-deployment
  cancel-in-progress: false

jobs:
  quality:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main') }}
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: aviaoutdoor_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ci-postgres-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d aviaoutdoor_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:ci-postgres-password@127.0.0.1:5432/aviaoutdoor_test?schema=public
      JWT_SECRET: ci-jwt-secret-with-at-least-thirty-two-characters
      PASSWORD_PEPPER: ci-password-pepper-with-at-least-thirty-two-characters
      ADMIN_USERNAME: ci-admin@example.invalid
      ADMIN_PASSWORD: ci-admin-password-not-used-in-production
      CORS_ORIGIN: http://localhost:5173
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
      - name: Verify tested commit
        run: test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Install Linux-native build bindings
        run: npm i --no-save @rollup/rollup-linux-x64-gnu @tailwindcss/oxide-linux-x64-gnu lightningcss-linux-x64-gnu
      - run: npm run prisma:generate --workspace @avia/api
      - run: npx prisma migrate deploy --schema apps/api/prisma/schema.prisma
      - run: npx vitest run --maxWorkers=1
      - run: npm run lint
      - run: npm run build

  dependency-audit:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
      - name: Verify audited commit
        run: test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Report production dependency advisories
        run: npm audit --omit=dev

  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main') }}
    needs:
      - quality
      - dependency-audit
    runs-on: ubuntu-latest
    env:
      DEPLOY_SHA: ${{ github.sha }}
      VPS_APP_DIR: /var/www/kasir-aviaoutdoor
    steps:
      - name: Authenticate host and deploy tested commit
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_SSH_HOST_FINGERPRINT: ${{ secrets.VPS_SSH_HOST_FINGERPRINT }}
        run: |
          set -euo pipefail

          if [ -z "$VPS_HOST" ] || [ -z "$VPS_USER" ] || [ -z "$VPS_SSH_KEY" ] || [ -z "$VPS_PORT" ] || [ -z "$VPS_SSH_HOST_FINGERPRINT" ]; then
            echo "Missing required deploy secret: VPS_HOST, VPS_USER, VPS_SSH_KEY, VPS_PORT, or VPS_SSH_HOST_FINGERPRINT"
            exit 1
          fi
          case "$VPS_PORT" in
            ''|*[!0-9]*) echo "VPS_PORT must be numeric."; exit 1 ;;
          esac
          if [ "$VPS_PORT" -lt 1 ] || [ "$VPS_PORT" -gt 65535 ]; then
            echo "VPS_PORT must be between 1 and 65535."
            exit 1
          fi
          if ! printf '%s' "$VPS_SSH_HOST_FINGERPRINT" | grep -Eq '^SHA256:[A-Za-z0-9+/]{43}$'; then
            echo "VPS_SSH_HOST_FINGERPRINT must be one SHA256 host-key fingerprint."
            exit 1
          fi

          KEY_FILE="$(mktemp)"
          SCANNED_HOST_KEYS="$(mktemp)"
          KNOWN_HOSTS="$(mktemp)"
          trap 'rm -f "$KEY_FILE" "$SCANNED_HOST_KEYS" "$KNOWN_HOSTS"' EXIT
          printf '%s\n' "$VPS_SSH_KEY" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"

          if ! ssh-keygen -y -P "" -f "$KEY_FILE" >/dev/null 2>&1; then
            echo "VPS_SSH_KEY must be a valid unencrypted deploy key. Passphrase-protected keys are intentionally unsupported."
            exit 1
          fi

          ssh-keyscan -T 10 -p "$VPS_PORT" "$VPS_HOST" > "$SCANNED_HOST_KEYS" 2>/dev/null
          test -s "$SCANNED_HOST_KEYS"
          while IFS= read -r host_key; do
            fingerprint="$(printf '%s\n' "$host_key" | ssh-keygen -lf - -E sha256 | awk '{print $2}')"
            if [ "$fingerprint" = "$VPS_SSH_HOST_FINGERPRINT" ]; then
              printf '%s\n' "$host_key" >> "$KNOWN_HOSTS"
            fi
          done < "$SCANNED_HOST_KEYS"
          if [ ! -s "$KNOWN_HOSTS" ]; then
            echo "VPS SSH host fingerprint did not match the trusted fingerprint."
            exit 1
          fi
          chmod 600 "$KNOWN_HOSTS"

          SSH_ARGS=(
            -i "$KEY_FILE"
            -o BatchMode=yes
            -o IdentitiesOnly=yes
            -o StrictHostKeyChecking=yes
            -o UserKnownHostsFile="$KNOWN_HOSTS"
            -p "$VPS_PORT"
          )
          ssh "${SSH_ARGS[@]}" "$VPS_USER@$VPS_HOST" "echo SSH_PRECHECK_OK"
          ssh "${SSH_ARGS[@]}" "$VPS_USER@$VPS_HOST" \
            "set -euo pipefail; /usr/local/bin/deploy-kasir.sh '$DEPLOY_SHA'; actual=\$(git -C '$VPS_APP_DIR' rev-parse HEAD); test \"\$actual\" = '$DEPLOY_SHA'; printf 'DEPLOYED_SHA=%s\\n' \"\$actual\""
