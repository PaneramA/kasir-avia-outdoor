name: Deploy Production

on:
  workflow_dispatch:
  pull_request:
    types:
      - closed
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  gate-merge-pr:
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}
    steps:
      - name: Check commit comes from merged PR to main
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const commitSha = context.sha;
            const baseRef = 'main';

            const response = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner,
              repo,
              commit_sha: commitSha
            });

            const mergedPr = response.data.find(
              (pr) => pr.base.ref === baseRef && pr.merged_at
            );

            if (mergedPr) {
              core.info(`Deploy allowed. Commit is from merged PR #${mergedPr.number}.`);
              core.setOutput('should_deploy', 'true');
              return;
            }

            core.warning('Deploy skipped: push to main is not associated with a merged PR.');
            core.setOutput('should_deploy', 'false');

  deploy:
    needs: gate-merge-pr
    if: ${{ needs.gate-merge-pr.outputs.should_deploy == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Validate deploy secrets
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_SSH_PASSPHRASE: ${{ secrets.VPS_SSH_PASSPHRASE }}
        run: |
          if [ -z "$VPS_HOST" ] || [ -z "$VPS_USER" ] || [ -z "$VPS_SSH_KEY" ] || [ -z "$VPS_PORT" ]; then
            echo "Missing one or more required secrets: VPS_HOST, VPS_USER, VPS_SSH_KEY, VPS_PORT"
            exit 1
          fi

          KEY_FILE="$(mktemp)"
          printf '%s\n' "$VPS_SSH_KEY" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"

          if ! ssh-keygen -l -f "$KEY_FILE" >/dev/null 2>&1; then
            echo "VPS_SSH_KEY is not a valid private key format."
            echo "Make sure it includes BEGIN/END lines and full multiline content."
            rm -f "$KEY_FILE"
            exit 1
          fi

          if ! ssh-keygen -y -P "" -f "$KEY_FILE" >/dev/null 2>&1; then
            if [ -z "$VPS_SSH_PASSPHRASE" ]; then
              echo "VPS_SSH_KEY appears to be passphrase-protected."
              echo "Set secret VPS_SSH_PASSPHRASE or use an unencrypted deploy key."
              rm -f "$KEY_FILE"
              exit 1
            fi
          fi

          rm -f "$KEY_FILE"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          port: ${{ secrets.VPS_PORT }}
          timeout: 60s
          command_timeout: 20m
          debug: true
          script: /usr/local/bin/deploy-kasir.sh
